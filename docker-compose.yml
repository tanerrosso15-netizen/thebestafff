services:
  affiliate:
    build: .
    container_name: pqp-affiliate
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - backend/.env
    volumes:
      - affiliate-data:/app/backend/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  affiliate-data:
